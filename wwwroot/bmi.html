<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI 身體質量指數試算</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --hospital-primary: #0f4c81;
            --hospital-soft: #f2f8fd;
            --hospital-accent: #2a9d8f;
            --hospital-warm: #f7f3ea;
        }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 15% 10%, #d9ecfb 0%, transparent 35%),
                radial-gradient(circle at 90% 85%, #e7f6ef 0%, transparent 35%),
                linear-gradient(135deg, var(--hospital-soft) 0%, #ffffff 55%, var(--hospital-warm) 100%);
            color: #1f2a37;
        }

        .bmi-card {
            border: 0;
            border-radius: 1.2rem;
            overflow: hidden;
        }

        .card-header-medical {
            background: linear-gradient(120deg, var(--hospital-primary), #1b6aa8);
            color: #ffffff;
            padding: 1.25rem 1.5rem;
        }

        .hospital-note {
            border-left: 4px solid var(--hospital-accent);
            background: #f7fcfa;
        }

        .result-badge {
            font-size: 0.9rem;
            letter-spacing: 0.03em;
        }

        .bmi-guide th,
        .bmi-guide td {
            vertical-align: middle;
        }

        .btn-hospital {
            background: var(--hospital-primary);
            border-color: var(--hospital-primary);
        }

        .btn-hospital:hover {
            background: #0c416e;
            border-color: #0c416e;
        }

        .result-panel {
            border: 1px solid #dbe8f3;
            border-radius: 0.75rem;
            background: #fbfdff;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-xl-7 col-lg-8 col-md-10">
                <div class="card bmi-card shadow-lg">
                    <div class="card-header-medical">
                        <h1 class="h4 mb-1">BMI 身體質量指數試算</h1>
                        <p class="mb-0">衛教工具，協助您快速了解體位狀態</p>
                    </div>
                    <div class="card-body p-4">
                        <div class="hospital-note rounded p-3 mb-4">
                            <p class="mb-0 text-secondary">
                                說明：BMI 僅作為初步參考，若您有慢性病、孕期或特殊健康狀況，建議由專業醫護人員進一步評估。
                            </p>
                        </div>

                        <form id="bmiForm">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="weight" class="form-label">體重 (公斤 kg)</label>
                                    <input type="number" class="form-control" id="weight" name="weight" step="0.1" min="1" placeholder="例如：65" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="height" class="form-label">身高 (公分 cm)</label>
                                    <input type="number" class="form-control" id="height" name="height" step="0.1" min="1" placeholder="例如：170" required>
                                </div>
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-hospital text-white">開始計算 BMI</button>
                                <button type="reset" class="btn btn-outline-secondary">清除內容</button>
                            </div>
                        </form>

                        <div id="result" class="mt-4" aria-live="polite"></div>

                        <div class="table-responsive mt-4">
                            <table class="table table-bordered table-hover bmi-guide mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th scope="col">BMI 範圍</th>
                                        <th scope="col">體位判定</th>
                                        <th scope="col">建議方向</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>&lt; 18.5</td>
                                        <td>體重過輕</td>
                                        <td>均衡增重與營養補充</td>
                                    </tr>
                                    <tr>
                                        <td>18.5 - 23.9</td>
                                        <td>健康體位</td>
                                        <td>維持規律運動與飲食</td>
                                    </tr>
                                    <tr>
                                        <td>24 - 26.9</td>
                                        <td>體重過重</td>
                                        <td>增加活動量並調整熱量</td>
                                    </tr>
                                    <tr>
                                        <td>&ge; 27</td>
                                        <td>肥胖</td>
                                        <td>建議門診諮詢體重管理</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const bmiForm = document.getElementById("bmiForm");
        const result = document.getElementById("result");

        function getBmiCategory(bmi) {
            if (bmi < 18.5) {
                return { label: "體重過輕", badgeClass: "bg-info", advice: "可與營養師討論增重策略，提升肌肉量與營養密度。" };
            }
            if (bmi < 24.0) {
                return { label: "健康體位", badgeClass: "bg-success", advice: "請持續維持均衡飲食、每週規律運動與充足睡眠。" };
            }
            if (bmi < 27) {
                return { label: "體重過重", badgeClass: "bg-warning text-dark", advice: "建議減少高糖高油攝取，逐步增加日常活動量。" };
            }
            return { label: "肥胖", badgeClass: "bg-danger", advice: "建議至門診評估，擬定個人化體重與代謝管理計畫。" };
        }

        function renderError(message) {
            result.innerHTML = `
                <div class="alert alert-danger mb-0" role="alert">
                    ${message}
                </div>`;
        }

        function renderResult(weight, heightCm, bmi, category) {
            result.innerHTML = `
                <div class="result-panel p-3" role="status">
                    <div class="d-flex justify-content-between align-items-center gap-2 flex-wrap">
                        <div>
                            <h5 class="mb-1">您的 BMI：<strong>${bmi.toFixed(1)}</strong></h5>
                            <p class="mb-2 text-secondary">體重 ${weight.toFixed(1)} 公斤 / 身高 ${heightCm.toFixed(1)} 公分</p>
                            <p class="mb-0 small text-secondary">${category.advice}</p>
                        </div>
                        <span class="badge result-badge ${category.badgeClass}">${category.label}</span>
                    </div>
                </div>`;
        }

        bmiForm.addEventListener("submit", function (event) {
            event.preventDefault();

            const weight = Number.parseFloat(document.getElementById("weight").value);
            const heightCm = Number.parseFloat(document.getElementById("height").value);

            if (!Number.isFinite(weight) || !Number.isFinite(heightCm) || weight <= 0 || heightCm <= 0) {
                renderError("請輸入大於 0 的有效數值。");
                return;
            }

            const heightM = heightCm / 100;
            const bmi = weight / (heightM * heightM);
            const category = getBmiCategory(bmi);

            renderResult(weight, heightCm, bmi, category);
        });

        bmiForm.addEventListener("reset", function () {
            result.innerHTML = "";
        });
    </script>
</body>
</html>
